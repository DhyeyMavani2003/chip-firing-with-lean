name: Documentation Build & Deploy to GitHubPages

on:
  push:
  pull_request:
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  id-token: write # Required to upload the site to GitHub Pages
  pages: write # Write access to GitHub Pages

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build and lint the project.
        id: build-lean
        uses: leanprover/lean-action@f807b338d95de7813c5c50d018f1c23c9b93b4ec # v1.2.0

      - name: Build project documentation.
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: leanprover-community/docgen-action@v1

      - name: Build project documentation for manual dispatch.
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          cd docbuild
          MATHLIB_NO_CACHE_ON_UPDATE=1 lake update ChipFiringWithLean
          lake build ChipFiringWithLean:docs
          cd ..
          mkdir -p docs
          rm -rf docs/docs
          cp -r docbuild/.lake/build/doc docs/docs

      - name: Upload manual documentation artifact.
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs

      - name: Deploy manual documentation to GitHub Pages.
        if: github.ref == 'refs/heads/master' && github.event_name == 'workflow_dispatch'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
